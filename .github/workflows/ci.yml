name: ci-lab

on:
  pull_request:
  push:
    branches: [main]

# Keep token scope minimal even in the baseline pipeline.
permissions:
  contents: read

# Cancel superseded runs to reduce queue time and compute waste.
concurrency:
  group: ci-baseline-${{ github.ref }}
  cancel-in-progress: true

# This baseline workflow is intentionally simple so participants can identify
# clear optimisation opportunities during the workshop.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No dependency cache is configured here, so each run pays the full install cost.
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    # Test depends on build, but the workflow does not reuse a build artifact.
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Dependencies are installed again, which duplicates work across jobs.
      - name: Install dependencies
        run: npm ci
      # Tests run in a single job with no sharding, so duration improvement is possible.
      - name: Run tests
        run: npm test
        env:
          # Flaky mode is enabled in CI so teams have a realistic reliability issue to discuss.
          SIMULATE_FLAKY: "1"
          # Increase failure probability so the flaky scenario is observable during short workshops.
          SIMULATE_FLAKY_RATE: "0.45"
